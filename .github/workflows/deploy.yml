name: Deploy ROS 2 Documentation Site

on:
    # Runs on pushes targeting the default branch and tags
    push:
        branches: ["main"]
        tags: ["v*.*.*"]
    # Triggers on ANY pull request
    pull_request:
    # Allows this workflow to run manually
    workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment
# to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allows only one concurrent deployment
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    # Build job
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                # Fetch all history for all branches
                # and tags
                fetch-depth: 0
                lfs: true

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'

            - name: Install pipenv
              run: pip install pipenv

            - name: Install dependencies
              run: pipenv sync --dev

            - name: Build with sphinx-build (for PR)
              # This step only runs on pull requests
              if: github.event_name == 'pull_request'
              run: pipenv run sphinx-build . _build/html

            - name: Build with sphinx-multiversion (for mainline)
              # This step only runs on push events to mainline
              if: github.event_name == 'push'
              run: pipenv run sphinx-multiversion . _build/html

            - name: Create redirect page (for main)
              if: github.event_name == 'push'
              run: echo '<!DOCTYPE html><meta http-equiv="refresh" content="0; url=./main/index.html">' > _build/html/index.html

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                path: _build/html

    # Deploy job
    deploy:
        # This condition ensures deployment ONLY runs on a
        # push to main
        if: github.event_name == 'push' &&
            github.ref == 'refs/heads/main'
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
