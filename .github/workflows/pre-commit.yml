name: Pre-commit Checks

on:
    pull_request:

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5

            - name: Run pre-commit
              uses: pre-commit/action@v3.0.1
